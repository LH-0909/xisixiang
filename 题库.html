<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>习思想题库</title>
<!-- Build: 2026-06-29 01:54:27 -->
<style>
/* === 习思想题库系统 - 全局样式 === */

:root {
  --primary: #8B0000;
  --primary-light: #C41E3A;
  --gold: #DAA520;
  --gold-light: #F0E68C;
  --bg: #FFF8F0;
  --card-bg: #FFFFFF;
  --text: #2C1810;
  --text-light: #666;
  --border: #E0D5C1;
  --success: #2E7D32;
  --error: #C62828;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.8;
  font-size: 17px;
}

/* === Header === */
.app-header {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff;
  padding: 20px 0;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  position: sticky;
  top: 0;
  z-index: 100;
}

.app-header h1 {
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: 2px;
}

.app-header .subtitle {
  font-size: 0.85rem;
  opacity: 0.85;
  margin-top: 4px;
}

.header-content {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 0 16px;
}

.header-toggle {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  width: 28px; height: 28px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 0.75rem;
  line-height: 1;
  flex-shrink: 0;
  transition: all 0.3s;
}
.header-toggle:hover { background: rgba(255,255,255,0.35); }

.app-header.collapsed { padding: 6px 0; }
.app-header.collapsed h1 { font-size: 1rem; }
.app-header.collapsed .subtitle { display: none; }
.app-header.collapsed .header-toggle { transform: rotate(180deg); }

/* === Navigation === */
.nav-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 76px;
  z-index: 99;
}

.nav-bar.collapsed { display: none; }

.nav-back {
  color: var(--primary);
  text-decoration: none;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  border: none;
  background: none;
  font-family: inherit;
}

.nav-back:hover { opacity: 0.7; }

/* === Container === */
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

/* === Unit Cards === */
.unit-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
  padding: 20px 0;
}

.unit-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 24px 20px;
  text-align: center;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  border: 2px solid transparent;
  text-decoration: none;
  color: var(--text);
  display: block;
}

.unit-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  border-color: var(--primary-light);
}

.unit-card .unit-num {
  font-size: 2rem;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 4px;
}

.unit-card .unit-title {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 4px;
}

.unit-card .unit-count {
  font-size: 0.8rem;
  color: var(--text-light);
}

.unit-progress {
  display: block;
  margin-top: 6px;
  font-size: 0.75rem;
  color: #E65100;
  font-weight: 600;
}

.unit-card.special {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff;
  border-color: transparent;
}

.unit-card.special .unit-num,
.unit-card.special .unit-title,
.unit-card.special .unit-count {
  color: #fff;
}

/* VIP cards */
.unit-card.vip-card {
  border-color: #B71C1C;
  background: linear-gradient(135deg, #FFF8F8, #FFEBEE);
}
.unit-card.vip-card:hover {
  border-color: #8B0000;
  box-shadow: 0 4px 16px rgba(139, 0, 0, 0.15);
}
.unit-card .vip-num {
  background: linear-gradient(135deg, #8B0000, #C41E3A);
  color: #fff;
}

/* === Mode Selection === */
.mode-select {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

.mode-btn {
  flex: 1;
  min-width: 120px;
  padding: 14px 20px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  background: var(--card-bg);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  font-family: inherit;
  color: var(--text);
}

.mode-btn:hover {
  border-color: var(--primary-light);
  background: #FFF5F5;
}

.mode-btn.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

.mode-btn .icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }

/* === Question Card === */
.question-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}

.question-num {
  display: inline-block;
  background: var(--primary);
  color: #fff;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.85rem;
  margin-bottom: 12px;
}

.question-text {
  font-size: 1.1rem;
  font-weight: 500;
  margin-bottom: 20px;
  line-height: 1.8;
}

/* === Options === */
.options-list {
  list-style: none;
}

.option-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  border: 2px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}

.option-item:hover {
  background: #FFF5F5;
  border-color: var(--primary-light);
}

.option-item.selected {
  background: #FFF0F0;
  border-color: var(--primary);
}

.option-item.correct {
  background: #E8F5E9;
  border-color: var(--success);
  color: #1B5E20;
}

.option-item.wrong {
  background: #FFEBEE;
  border-color: var(--error);
  color: #B71C1C;
}

.option-item.disabled {
  pointer-events: none;
  opacity: 0.85;
}

.option-letter {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #F5F5F5;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.9rem;
  flex-shrink: 0;
}

.option-item.selected .option-letter { background: var(--primary); color: #fff; }
.option-item.correct .option-letter { background: var(--success); color: #fff; }
.option-item.wrong .option-letter { background: var(--error); color: #fff; }

.option-text { flex: 1; padding-top: 4px; }

/* === Feedback === */
.feedback {
  padding: 12px 16px;
  border-radius: 8px;
  margin-top: 16px;
  font-weight: 600;
  display: none;
}

.feedback.show { display: block; }

.feedback.correct-fb {
  background: #E8F5E9;
  color: #2E7D32;
  border-left: 4px solid var(--success);
}

.feedback.wrong-fb {
  background: #FFEBEE;
  color: #C62828;
  border-left: 4px solid var(--error);
}

/* === Bottom Bar === */
.bottom-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0;
  gap: 12px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 12px 28px;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}

.btn-primary {
  background: var(--primary);
  color: #fff;
}

.btn-primary:hover { background: var(--primary-light); }

.btn-outline {
  background: #fff;
  color: var(--primary);
  border: 2px solid var(--primary);
}

.btn-outline:hover { background: #FFF5F5; }

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* === Progress Bar === */
.progress-bar {
  width: 100%;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  margin-bottom: 20px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  border-radius: 3px;
  transition: width 0.3s;
}

.progress-text {
  text-align: center;
  font-size: 0.85rem;
  color: var(--text-light);
  margin-bottom: 12px;
}

/* === Result Summary === */
.result-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 32px;
  text-align: center;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}

.result-score {
  font-size: 4rem;
  font-weight: 700;
  color: var(--primary);
  margin: 16px 0;
}

.result-detail {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin: 20px 0;
}

.result-item {
  padding: 12px;
  border-radius: 8px;
  background: #F8F8F8;
}

.result-item .num {
  font-size: 1.5rem;
  font-weight: 700;
}

.result-item .label {
  font-size: 0.9rem;
  color: var(--text-light);
}

/* === Sidebar === */
.layout {
  display: flex;
  gap: 20px;
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 16px 40px;
}

.main-area {
  flex: 1;
  min-width: 0;
}

.sidebar {
  width: 260px;
  flex-shrink: 0;
  position: sticky;
  top: 140px;
  align-self: flex-start;
  max-height: calc(100vh - 160px);
  overflow-y: auto;
  background: var(--card-bg);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 12px;
  transition: width 0.3s;
}

.sidebar.collapsed {
  width: 44px;
  padding: 8px;
}

.sidebar-toggle {
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  padding: 4px 0 8px;
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--primary);
  user-select: none;
}

.sidebar.collapsed .sidebar-label { display: none; }
.sidebar.collapsed .sidebar-grid { display: none; }

.sidebar-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}

.sidebar-num {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.82rem;
  font-weight: 600;
  border: 2px solid var(--border);
  transition: all 0.15s;
  background: #fafafa;
}

.sidebar-num:hover { border-color: var(--primary-light); background: #FFF5F5; }
.sidebar-num.current { background: var(--primary); color: #fff; border-color: var(--primary); }
.sidebar-num.answered { background: #E8F5E9; border-color: var(--success); color: #2E7D32; }
.sidebar-num.skipped { background: #FFF8E1; border-color: #F9A825; color: #F57F17; }

.sidebar-legend {
  display: flex;
  gap: 12px;
  margin-top: 8px;
  font-size: 0.75rem;
  flex-wrap: wrap;
}

.sidebar-legend span { display: flex; align-items: center; gap: 3px; }

.legend-dot {
  width: 12px; height: 12px; border-radius: 3px; display: inline-block;
}
.legend-dot.cur { background: var(--primary); }
.legend-dot.ans { background: #E8F5E9; border: 1px solid var(--success); }
.legend-dot.skip { background: #FFF8E1; border: 1px solid #F9A825; }
.legend-dot.unans { background: #fafafa; border: 1px solid var(--border); }

/* === Section Header in Sidebar === */
.sidebar-section {
  grid-column: 1 / -1;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--primary);
  padding: 8px 0 2px;
  margin-top: 4px;
  border-top: 1px dashed var(--border);
  text-align: center;
}

.sidebar-section:first-child {
  border-top: none;
  margin-top: 0;
}

/* === Section Info Bar === */
.section-info {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  margin-bottom: 12px;
  background: var(--card-bg);
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--primary);
}

.section-info .section-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--primary);
}

/* === Multi-select checkmark === */
.option-item .checkmark {
  width: 20px; height: 20px;
  border: 2px solid #ccc;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  margin-right: 4px;
}

.option-item.selected .checkmark {
  background: var(--primary);
  border-color: var(--primary);
}

.option-item.selected .checkmark::after {
  content: '✓';
  color: #fff;
  font-size: 0.8rem;
  font-weight: 700;
}

.option-item.correct .checkmark {
  background: var(--success);
  border-color: var(--success);
}

.option-item.correct .checkmark::after {
  content: '✓';
  color: #fff;
  font-size: 0.8rem;
}

.option-item.wrong .checkmark {
  background: var(--error);
  border-color: var(--error);
}

/* === Question type badge === */
.type-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 0.8rem;
  font-weight: 600;
  margin-left: 8px;
}

.type-badge.single { background: #E3F2FD; color: #1565C0; }
.type-badge.multi { background: #FCE4EC; color: #C62828; }
.type-badge.judge { background: #E8F5E9; color: #2E7D32; }

/* === Sidebar responsive === */
@media (max-width: 768px) {
  .layout { flex-direction: column; }
  .sidebar {
    position: static;
    width: 100% !important;
    max-height: none;
    order: -1;
  }
  .sidebar-grid { grid-template-columns: repeat(8, 1fr); }
  .sidebar.collapsed .sidebar-grid { display: grid; }
}

/* === Wrong Book === */
.wrong-list {
  list-style: none;
}

.wrong-item {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 12px;
}

.wrong-item:hover {
  background: #FFF5F5;
  transform: translateX(4px);
}

.wrong-item .w-icon {
  font-size: 1.5rem;
  flex-shrink: 0;
}

.wrong-item .w-info {
  flex: 1;
  min-width: 0;
}

.wrong-item .w-title {
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.wrong-item .w-meta {
  font-size: 0.8rem;
  color: var(--text-light);
  margin-top: 2px;
}

.wrong-item .w-count {
  background: var(--error);
  color: #fff;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
}

/* === Empty State === */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-light);
}

.empty-state .icon { font-size: 4rem; margin-bottom: 16px; }

.empty-state p { font-size: 1rem; }

/* === Score Badge === */
.score-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 0.95rem;
}

.score-badge.excellent { background: #E8F5E9; color: #2E7D32; }
.score-badge.good { background: #FFF3E0; color: #E65100; }
.score-badge.poor { background: #FFEBEE; color: #C62828; }

/* === Review Mode === */
.review-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 10px;
}

.btn-sm {
  padding: 8px 16px;
  font-size: 0.85rem;
  border-radius: 6px;
}

.btn-danger {
  background: var(--error);
  color: #fff;
}

.btn-danger:hover { opacity: 0.85; }

/* === Timer === */
.timer {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--primary);
  display: flex;
  align-items: center;
  gap: 6px;
}

/* === Responsive === */
@media (max-width: 600px) {
  .container { padding: 12px 10px 30px; }
  .unit-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .unit-card { padding: 16px 12px; }
  .unit-card .unit-num { font-size: 1.5rem; }
  .question-card { padding: 16px; }
  .question-text { font-size: 1rem; }
  .mode-btn { padding: 10px 14px; font-size: 0.9rem; }
  .result-detail { grid-template-columns: 1fr; }
  .app-header h1 { font-size: 1.3rem; }
}

@media print {
  .app-header, .nav-bar, .bottom-bar, .mode-select { display: none; }
  .question-card { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
}

</style>
</head>
<body>

<!-- ====== HOME PAGE ====== -->
<div id="pg-home">
<header class="app-header" id="home-header">
  <div class="header-content">
    <div>
      <h1>习思想题库</h1>
      <div class="subtitle">习近平新时代中国特色社会主义思想 · 学习自测系统</div>
    </div>
    <button class="header-toggle" onclick="toggleHeader('home-header')" title="收缩标题栏">▲</button>
  </div>
</header>
<div class="container">
  <div style="text-align:center;padding:12px 0 4px;color:#666;font-size:0.9rem">
    共 <strong>11</strong> 个单元 · <strong id="total-count">--</strong> 道选择题 · 单选+多选 · 练习+测验
  </div>
  <div class="unit-grid" id="unit-grid"></div>
  <div style="text-align:center;margin-top:20px" id="vip-section">
    <h2 style="color:#8B0000;margin-bottom:12px">🔒 VIP 套题</h2>
    <div style="color:#666;font-size:0.85rem;margin-bottom:12px">共 <strong>45</strong> 套 · <strong id="vip-total-count">--</strong> 道选择题</div>
    <div class="unit-grid" id="vip-grid"></div>
  </div>
  <div style="text-align:center;margin-top:16px">
    <div class="unit-card special" style="display:inline-block;min-width:200px;cursor:pointer" onclick="goWrong()">
      <div class="unit-num">📋</div>
      <div class="unit-title">全部错题本</div>
      <div class="unit-count" id="wrong-count">查看所有单元的错题</div>
    </div>
  </div>
</div>
</div>

<!-- ====== UNIT PAGE ====== -->
<div id="pg-unit" style="display:none">
<header class="app-header" id="unit-header">
  <div class="header-content">
    <div>
      <h1 id="unit-title">单元练习</h1>
      <div class="subtitle" id="u-mode-label">练习模式 — 选择后提交查看对错</div>
    </div>
    <button class="header-toggle" onclick="toggleHeader('unit-header')" title="收缩标题栏">▲</button>
  </div>
</header>
<nav class="nav-bar">
  <button class="nav-back" onclick="goHome()">← 返回首页</button>
  <span style="flex:1"></span>
  <span class="timer" id="u-timer" style="display:none">⏱ 00:00</span>
</nav>
<div class="layout">
  <aside class="sidebar" id="u-sidebar">
    <div class="sidebar-toggle" onclick="unitPage.toggleSidebar()">
      <span>📋 题目导航</span>
      <span id="u-sidebar-arrow">◀</span>
    </div>
    <div class="sidebar-grid" id="u-sidebar-grid"></div>
    <div class="sidebar-legend">
      <span><span class="legend-dot cur"></span>当前</span>
      <span><span class="legend-dot ans"></span>已答</span>
      <span><span class="legend-dot skip"></span>标记</span>
      <span><span class="legend-dot unans"></span>未答</span>
    </div>
  </aside>
  <div class="main-area">
    <div class="mode-select">
      <button class="mode-btn active" id="u-btn-practice" onclick="unitPage.switchMode('practice')"><span class="icon">📝</span> 练习模式</button>
      <button class="mode-btn" id="u-btn-test" onclick="unitPage.switchMode('test')"><span class="icon">📋</span> 单元测验</button>
      <button class="mode-btn" id="u-btn-wrong" onclick="unitPage.switchMode('wrong')"><span class="icon">📌</span> 单元错题</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="u-progress-fill" style="width:0%"></div></div>

/* === 习思想题库 - 纯函数库（零DOM依赖，跨页面共享）=== */

// ====== Fisher-Yates 洗牌 ======

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

// ====== 格式化时间 m:ss ======

function formatTime(seconds) {
  var m = Math.floor(seconds / 60);
  var s = seconds % 60;
  return m + ':' + (s < 10 ? '0' : '') + s;
}

// ====== 评分等级 ======

function getScoreGrade(percent) {
  if (percent >= 90) return { text: '优秀', cls: 'excellent' };
  if (percent >= 70) return { text: '良好', cls: 'good' };
  if (percent >= 60) return { text: '及格', cls: 'poor' };
  return { text: '需努力', cls: 'poor' };
}

// ====== 答案判定（单选 + 多选）======

function isAnswerCorrect(userAns, realAns) {
  if (userAns === undefined) return false;
  if (Array.isArray(realAns) && Array.isArray(userAns)) {
    if (realAns.length !== userAns.length) return false;
    var s = userAns.slice().sort(function(a, b) { return a - b; });
    return realAns.every(function(v, i) { return v === s[i]; });
  }
  if (!Array.isArray(realAns) && !Array.isArray(userAns)) return userAns === realAns;
  return false;
}

// ====== 选项乱序（返回乱序后的 opts + 映射后的答案索引）======

function shuffleOptions(q) {
  var indices = q.opts.map(function(_, i) { return i; });
  var s = shuffle(indices);
  var newOpts = s.map(function(i) { return q.opts[i]; });
  var newAns = Array.isArray(q.ans)
    ? q.ans.map(function(a) { return s.indexOf(a); }).sort(function(a, b) { return a - b; })
    : s.indexOf(q.ans);
  return { opts: newOpts, ans: newAns };
}

// ====== 查找单元（跨 UNITS + VIP_UNITS）======

function findUnit(uid) {
  var found = null;
  if (typeof UNITS !== 'undefined') {
    found = UNITS.find(function(u) { return u.id === uid; });
  }
  if (!found && typeof VIP_UNITS !== 'undefined') {
    found = VIP_UNITS.find(function(u) { return u.id === uid; });
  }
  return found;
}

// ====== 判断是否为VIP单元 ======

function isVipUnit(uid) {
  return uid >= 12;
}

/* === storage.js === */
/* === 习思想题库 - 持久化层（版本校验 + 自动备份 + 完整性检查）=== */

var STORAGE_VERSION = 1;
var STORAGE_KEY = 'xixiang_wrong_book';
var HISTORY_KEY = 'xixiang_test_history';
var PROGRESS_PREFIX = 'xixiang_unit_progress_';
var VIP_UNLOCKED_KEY = 'xisixiang_vip_unlocked';

// ====== Internal helpers ======

function _backupBeforeWrite(key) {
  try {
    var current = localStorage.getItem(key);
    if (current) {
      localStorage.setItem(key + '_backup', current);
    }
  } catch(e) {}
}

function _addMeta(data) {
  data._meta = { version: STORAGE_VERSION, lastModified: Date.now() };
  return data;
}

function _migrateIfNeeded(data) {
  if (!data._meta || data._meta.version < STORAGE_VERSION) {
    // Migrate unversioned → v1: just add meta
    data._meta = { version: STORAGE_VERSION, lastModified: Date.now() };
  }
  return data;
}

// ====== Wrong Book ======

function getWrongBook() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return _addMeta({});
    var data = JSON.parse(raw);
    return _migrateIfNeeded(data);
  } catch(e) {
    // Backup corrupt data before resetting
    try {
      var corruptData = localStorage.getItem(STORAGE_KEY);
      if (corruptData) {
        localStorage.setItem(STORAGE_KEY + '_corrupt_' + Date.now(), corruptData);
      }
    } catch(e2) {}
    localStorage.removeItem(STORAGE_KEY);
    alert('⚠️ 检测到错题本数据损坏，已自动备份旧数据并重置。\n很抱歉，之前记录的错题可能丢失。');
    return _addMeta({});
  }
}

function saveWrongBook(data) {
  _backupBeforeWrite(STORAGE_KEY);
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(_addMeta(data)));
  } catch(e) {
    console.warn('无法保存错题本：存储可能已满');
  }
}

function addWrongQuestion(unitId, questionId) {
  var book = getWrongBook();
  var key = unitId + '_' + questionId;
  if (!book[key]) {
    book[key] = { unitId: unitId, questionId: questionId, wrongCount: 1, timestamp: Date.now() };
  } else {
    book[key].wrongCount += 1;
    book[key].timestamp = Date.now();
  }
  saveWrongBook(book);
}

function removeWrongQuestion(unitId, questionId) {
  var book = getWrongBook();
  var key = unitId + '_' + questionId;
  delete book[key];
  saveWrongBook(book);
}

function getUnitWrongQuestions(unitId) {
  var book = getWrongBook();
  var items = [];
  for (var k in book) {
    if (k === '_meta') continue;
    if (book[k].unitId === unitId) items.push(book[k]);
  }
  return items;
}

function getAllWrongQuestions() {
  var book = getWrongBook();
  var items = [];
  for (var k in book) {
    if (k === '_meta') continue;
    items.push(book[k]);
  }
  return items;
}

function isWrongQuestion(unitId, questionId) {
  var book = getWrongBook();
  return !!(book[unitId + '_' + questionId]);
}

function getWrongCount(unitId, questionId) {
  var book = getWrongBook();
  var key = unitId + '_' + questionId;
  return book[key] ? book[key].wrongCount : 0;
}

// ====== Test History ======

function saveTestHistory(unitId, score, total) {
  try {
    var history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || {};
    if (!history[unitId]) history[unitId] = [];
    history[unitId].push({ score: score, total: total, percent: Math.round(score / total * 100), time: Date.now() });
    if (history[unitId].length > 10) history[unitId] = history[unitId].slice(-10);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch(e) {
    console.warn('无法保存测验历史：存储可能已满');
  }
}

function getTestHistory(unitId) {
  try {
    var history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || {};
    return history[unitId] || [];
  } catch(e) {
    try {
      var corrupt = localStorage.getItem(HISTORY_KEY);
      if (corrupt) localStorage.setItem(HISTORY_KEY + '_corrupt_' + Date.now(), corrupt);
      localStorage.removeItem(HISTORY_KEY);
    } catch(e2) {}
    return [];
  }
}

// ====== Unit Progress ======

function saveUnitProgress(unitId, data) {
  try {
    var key = PROGRESS_PREFIX + unitId;
    var toSave = {
      mode: data.mode,
      userAnswers: data.userAnswers,
      submittedQuestions: data.submittedQuestions,
      skippedQuestions: data.skippedQuestions,
      currentIndex: data.currentIndex,
      testStarted: data.testStarted || false,
      testSubmitted: data.testSubmitted || false,
      timerSeconds: data.timerSeconds || 0,
      timestamp: Date.now()
    };
    localStorage.setItem(key, JSON.stringify(toSave));
  } catch(e) {
    console.warn('无法保存进度：存储可能已满');
  }
}

function loadUnitProgress(unitId) {
  try {
    var key = PROGRESS_PREFIX + unitId;
    var raw = localStorage.getItem(key);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) {
    try {
      var key = PROGRESS_PREFIX + unitId;
      var corrupt = localStorage.getItem(key);
      if (corrupt) localStorage.setItem(key + '_corrupt_' + Date.now(), corrupt);
      localStorage.removeItem(key);
    } catch(e2) {}
    return null;
  }
}

function clearUnitProgress(unitId) {
  try {
    localStorage.removeItem(PROGRESS_PREFIX + unitId);
  } catch(e) {}
}

function hasUnitProgress(unitId) {
  return loadUnitProgress(unitId) !== null;
}

// ====== VIP Unlock State ======

function isVipUnlocked() {
  try { return localStorage.getItem(VIP_UNLOCKED_KEY) === '1'; } catch(e) { return false; }
}

function unlockVip() {
  try { localStorage.setItem(VIP_UNLOCKED_KEY, '1'); } catch(e) {}
}

// ====== Storage Stats ======

function getStorageStats() {
  var stats = {
    wrongBookCount: 0,
    testHistoryUnits: 0,
    lastModified: null,
    storageUsed: 0
  };
  try {
    var book = getWrongBook();
    var count = 0;
    for (var k in book) { if (k !== '_meta') count++; }
    stats.wrongBookCount = count;
    stats.lastModified = book._meta ? book._meta.lastModified : null;
  } catch(e) {}
  try {
    var history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || {};
    var units = 0;
    for (var u in history) { units++; }
    stats.testHistoryUnits = units;
  } catch(e) {}
  try {
    var total = 0;
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && k.indexOf('xixiang_') === 0) {
        total += (localStorage.getItem(k) || '').length;
      }
    }
    stats.storageUsed = total;
  } catch(e) {}
  return stats;
}

// Simple page switcher - show/hide divs
let currentPage = 'home';

function go(p) {
  currentPage = p;
  document.getElementById('pg-home').style.display = (p === 'home') ? 'block' : 'none';
  document.getElementById('pg-unit').style.display = (p === 'unit') ? 'block' : 'none';

  window.scrollTo(0, 0);
}

function goHome() { go('home'); renderHomeData(); }
function goUnit(uid) { go('unit'); unitPage.start(uid); }
function goWrong() { go('wrong'); wrongPage.start(); }

// Helper: find unit by ID across both regular and VIP
function findUnit(uid) {
  return UNITS.find(function(u) { return u.id === uid; }) ||
         (typeof VIP_UNITS !== 'undefined' ? VIP_UNITS.find(function(u) { return u.id === uid; }) : undefined);
}

// ====== Collapsible Header ======
function toggleHeader(id) {
  var el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('collapsed');
  // Also toggle the next nav-bar
  var nav = el.nextElementSibling;
  if (nav && nav.classList.contains('nav-bar')) {
    nav.classList.toggle('collapsed');
  }
  try { localStorage.setItem('header_' + id, el.classList.contains('collapsed') ? '1' : '0'); } catch(e) {}
}
// Restore header state on load
(function() {
  ['home-header','unit-header','wrong-header'].forEach(function(id) {
    try {
      if (localStorage.getItem('header_' + id) === '1') {
        var el = document.getElementById(id);
        if (el) {
          el.classList.add('collapsed');
          var nav = el.nextElementSibling;
          if (nav && nav.classList.contains('nav-bar')) nav.classList.add('collapsed');
        }
      }
    } catch(e) {}
  });
})();

// ====== UNIT PAGE (stateful module) ======
var unitPage = (function() {
  var unit, mode, questions, currentIndex, userAnswers, submitted, skipped;
  var testStarted, testSubmitted, timerSeconds, timerInterval, sidebarCollapsed;
  var letters = 'ABCDEFGHIJ';

  function init(uid) {
    unit = findUnit(uid);
    if (!unit) { goHome(); return; }
    mode = 'practice';
    userAnswers = {}; submitted = {}; skipped = {};
    currentIndex = 0; testSubmitted = false; testStarted = false;
    sidebarCollapsed = false;
    stopTimer();
    document.getElementById('unit-title').textContent = unit.name;
    updateModeUI();
    startMode();
  }

  function toggleSidebar() {
    sidebarCollapsed = !sidebarCollapsed;
    var sb = document.getElementById('u-sidebar');
    if (sidebarCollapsed) { sb.classList.add('collapsed'); document.getElementById('u-sidebar-arrow').textContent = '▶'; }
    else { sb.classList.remove('collapsed'); document.getElementById('u-sidebar-arrow').textContent = '◀'; }
  }

  function getQuestions() {
    var qs;
    if (mode === 'wrong') {
      var wrongItems = getUnitWrongQuestions(unit.id);
      qs = [];
      wrongItems.forEach(function(item) {
        var q = unit.questions.find(function(q) { return q.id === item.questionId; });
        if (q) { var c = Object.assign({}, q); c.wrongCount = item.wrongCount; qs.push(c); }
      });
    } else {
      qs = unit.questions.map(function(q) { return Object.assign({}, q); });
    }
    qs.sort(function(a, b) { return a.type === b.type ? 0 : (a.type === 'single' ? -1 : 1); });
    if (mode === 'test') {
      qs = shuffle(qs).map(function(q) {
        var s = shuffleOpts(q);
        var c = Object.assign({}, q);
        c.shuffledOpts = s.opts;
        c._shuffledAns = s.ans;
        return c;
      });
    }
    return qs;
  }

  function shuffleOpts(q) {
    var indices = q.opts.map(function(_, i) { return i; });
    var s = shuffle(indices);
    var newOpts = s.map(function(i) { return q.opts[i]; });
    var newAns = Array.isArray(q.ans) ? q.ans.map(function(a) { return s.indexOf(a); }).sort(function(a, b) { return a - b; }) : s.indexOf(q.ans);
    return {opts: newOpts, ans: newAns};
  }

  function getRealAns(q) { return (mode === 'test' && q._shuffledAns !== undefined) ? q._shuffledAns : q.ans; }
  function getOpts(q) { return (mode === 'test' && q.shuffledOpts) ? q.shuffledOpts : q.opts; }

  function startMode() {
    userAnswers = {}; submitted = {}; skipped = {};
    currentIndex = 0; testSubmitted = false;
    stopTimer();
    document.getElementById('u-timer').style.display = 'none';

    if (mode === 'wrong' && getUnitWrongQuestions(unit.id).length === 0) {
      document.getElementById('u-content').innerHTML = '<div class="empty-state"><div class="icon">🎉</div><p>本单元暂无错题！</p></div>';
      document.getElementById('u-bottom').innerHTML = '';
      document.getElementById('u-progress-fill').style.width = '0%';
      document.getElementById('u-progress-text').textContent = '';
      document.getElementById('u-sidebar-grid').innerHTML = '';
      return;
    }

    questions = getQuestions();
    testStarted = (mode === 'test');
    if (testStarted) {
      startTimer();
      document.getElementById('u-timer').style.display = 'flex';
    }
    renderQuestion();
    updateProgress();
    renderSidebar();
  }

  function startTimer() { stopTimer(); timerSeconds = 0; updateTimerDisplay(); timerInterval = setInterval(function() { timerSeconds++; updateTimerDisplay(); }, 1000); }
  function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
  function updateTimerDisplay() { document.getElementById('u-timer').textContent = '⏱ ' + formatTime(timerSeconds); }

  function updateModeUI() {
    var labels = {practice: '练习模式 — 选择后提交查看对错', test: '单元测验 — 全部确认后交卷出分', wrong: '单元错题 — 针对性复习'};
    document.getElementById('u-mode-label').textContent = labels[mode];
    ['u-btn-practice','u-btn-test','u-btn-wrong'].forEach(function(id) { document.getElementById(id).classList.remove('active'); });
    document.getElementById('u-btn-' + mode).classList.add('active');
  }

  function switchMode(m) {
    mode = m; updateModeUI();
    userAnswers = {}; submitted = {}; skipped = {};
    currentIndex = 0; testSubmitted = false;
    stopTimer(); document.getElementById('u-timer').style.display = 'none';
    startMode();
  }

  function renderSidebar() {
    var grid = document.getElementById('u-sidebar-grid');
    var html = '';
    for (var i = 0; i < questions.length; i++) {
      var q = questions[i], cls = 'sidebar-num';
      if (i === currentIndex) cls += ' current';
      else if (submitted[q.id]) cls += ' answered';
      else if (skipped[q.id]) cls += ' skipped';
      html += '<div class="' + cls + '" onclick="unitPage.jump(' + i + ')">' + (i + 1) + '</div>';
    }
    grid.innerHTML = html;
  }

  function jump(idx) { currentIndex = idx; renderQuestion(); updateProgress(); renderSidebar(); window.scrollTo(0, 0); }

  function renderQuestion() {
    if (questions.length === 0) { document.getElementById('u-content').innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>没有题目</p></div>'; return; }
    var q = questions[currentIndex];
    var opts = getOpts(q), realAns = getRealAns(q);
    var isMulti = q.type === 'multi';
    var userAns = userAnswers[q.id];
    var submittedQ = submitted[q.id] || false;
    var showResult = (mode === 'test') ? testSubmitted : submittedQ;
    var hasSel = isMulti ? (Array.isArray(userAns) && userAns.length > 0) : (userAns !== undefined);

    var typeLabel = isMulti ? '<span class="type-badge multi">多选题</span>' : '<span class="type-badge single">单选题</span>';
    var optHTML = '';
    opts.forEach(function(opt, i) {
      var isSelected = Array.isArray(userAns) ? userAns.indexOf(i) >= 0 : (userAns === i);
      var isCorrect = Array.isArray(realAns) ? realAns.indexOf(i) >= 0 : (realAns === i);
      var cls = 'option-item';
      if (showResult) { cls += ' disabled'; if (isCorrect) cls += ' correct'; else if (isSelected && !isCorrect) cls += ' wrong'; }
      else if (isSelected) cls += ' selected';
      var chk = isMulti ? '<span class="checkmark"></span>' : '<span class="option-letter">' + letters[i] + '</span>';
      optHTML += '<div class="' + cls + '" data-idx="' + i + '">' + chk + '<span class="option-text">' + opt + '</span></div>';
    });

    var fbHTML = '';
    if (showResult) {
      if (isCorrect(userAns, realAns)) fbHTML = '<div class="feedback correct-fb show">✅ 回答正确！</div>';
      else {
        var cs = Array.isArray(realAns) ? realAns.map(function(a) { return letters[a] + '. ' + opts[a]; }).join('；') : letters[realAns] + '. ' + opts[realAns];
        fbHTML = '<div class="feedback wrong-fb show">❌ 回答错误！正确答案：<strong>' + cs + '</strong></div>';
      }
    }

    var sk = skipped[q.id] ? ' ⚑已标记' : '';
    var wc = q.wrongCount ? '<span style="margin-left:8px;color:#C62828;font-size:0.85rem">错过' + q.wrongCount + '次</span>' : '';
    document.getElementById('u-content').innerHTML =
      '<div class="question-card"><span class="question-num">第 ' + (currentIndex + 1) + ' 题</span>' + typeLabel + wc +
      (sk ? '<span style="margin-left:8px;color:#F57F17;font-size:0.85rem">' + sk + '</span>' : '') +
      '<div class="question-text">' + q.q + '</div>' +
      '<div style="font-size:0.85rem;color:#999;margin-bottom:8px">' + (isMulti ? '（可多选，选全所有正确答案后提交）' : '（单选，选择一个答案后提交）') + '</div>' +
      '<div class="options-list">' + optHTML + '</div>' + fbHTML + '</div>';

    if (!showResult) {
      var items = document.querySelectorAll('#u-content .option-item');
      items.forEach(function(item) {
        item.addEventListener('click', function() { handleSelect(parseInt(this.dataset.idx), isMulti); });
      });
    }
    renderBottom(hasSel, submittedQ);
  }

  function isCorrect(uAns, rAns) {
    if (uAns === undefined) return false;
    if (Array.isArray(rAns) && Array.isArray(uAns)) {
      if (rAns.length !== uAns.length) return false;
      var s = uAns.slice().sort(function(a, b) { return a - b; });
      return rAns.every(function(v, i) { return v === s[i]; });
    }
    if (!Array.isArray(rAns) && !Array.isArray(uAns)) return uAns === rAns;
    return false;
  }

  function handleSelect(oi, isMulti) {
    var q = questions[currentIndex];
    if (isMulti) {
      var cur = userAnswers[q.id];
      if (!Array.isArray(cur)) cur = [];
      var idx = cur.indexOf(oi);
      if (idx >= 0) cur.splice(idx, 1); else cur.push(oi);
      cur.sort(function(a, b) { return a - b; });
      userAnswers[q.id] = cur;
    } else {
      userAnswers[q.id] = oi;
    }
    delete skipped[q.id];
    renderQuestion(); renderSidebar();
  }

  function submitCurrent() {
    var q = questions[currentIndex], ua = userAnswers[q.id];
    var hasSel = q.type === 'multi' ? (Array.isArray(ua) && ua.length > 0) : (ua !== undefined);
    if (!hasSel) return;
    submitted[q.id] = true;
    if (mode === 'practice' || mode === 'wrong') {
      if (!isCorrect(ua, getRealAns(q))) addWrongQuestion(unit.id, q.id);
      else { if (isWrongQuestion(unit.id, q.id)) removeWrongQuestion(unit.id, q.id); }
    }
    renderQuestion(); renderSidebar();
  }

  function renderBottom(hasSel, submittedQ) {
    var q = questions[currentIndex];
    var isLast = currentIndex >= questions.length - 1, isFirst = currentIndex <= 0;
    var allSub = questions.every(function(q) { return submitted[q.id]; });
    var isSk = skipped[q.id];
    var html = '';

    if (mode === 'test' && !testSubmitted) {
      html += '<button class="btn btn-outline" onclick="unitPage.prevQ()" ' + (isFirst ? 'disabled' : '') + '>← 上一题</button>';
      html += '<button class="btn btn-outline btn-sm" onclick="unitPage.markSkip()" style="background:' + (isSk ? '#FFF8E1' : '#fff') + '">' + (isSk ? '已标记 ⚑' : '标记 ⚐') + '</button>';
      var ac = questions.filter(function(q) { return submitted[q.id]; }).length;
      html += '<span style="font-size:0.9rem;color:#666">已确认 ' + ac + '/' + questions.length + '</span>';
      if (hasSel && !submittedQ) html += '<button class="btn btn-primary" onclick="unitPage.submitCur()">确认本题 ✓</button>';
      else html += '<button class="btn btn-primary" onclick="unitPage.nextQ()">下一题 →</button>';
      if (allSub) html += '<button class="btn btn-primary" onclick="unitPage.submitTest()" style="background:#C41E3A;margin-left:8px">📋 交卷</button>';
      else { var us = questions.length - ac; html += '<button class="btn btn-outline" onclick="unitPage.submitTest()" style="margin-left:8px;color:#C62828;border-color:#C62828">交卷(' + us + '题未确认)</button>'; }
    } else if (mode === 'test' && testSubmitted) {
      html += '<button class="btn btn-outline" onclick="unitPage.prevQ()" ' + (isFirst ? 'disabled' : '') + '>← 上一题</button><span style="font-size:0.9rem">浏览答卷</span>';
      html += '<button class="btn btn-primary" onclick="unitPage.nextQ()" ' + (isLast ? 'disabled' : '') + '>下一题 →</button>';
      html += '<button class="btn btn-outline" onclick="unitPage.switchMode(\'test\')">重新测验</button>';
    } else {
      html += '<button class="btn btn-outline" onclick="unitPage.prevQ()" ' + (isFirst ? 'disabled' : '') + '>← 上一题</button>';
      html += '<span style="font-size:0.9rem;color:#666">' + (currentIndex + 1) + ' / ' + questions.length + '</span>';
      if (hasSel && !submittedQ) html += '<button class="btn btn-primary" onclick="unitPage.submitCur()">提交答案 ✓</button>';
      else if (submittedQ) html += '<button class="btn btn-primary" onclick="' + (isLast ? 'unitPage.finishPractice()' : 'unitPage.nextQ()') + '">' + (isLast ? '完成练习 ✓' : '下一题 →') + '</button>';
      else html += '<button class="btn btn-primary" disabled>请先选择答案</button>';
    }
    document.getElementById('u-bottom').innerHTML = html;
  }

  function nextQ() { if (currentIndex < questions.length - 1) { currentIndex++; renderQuestion(); updateProgress(); renderSidebar(); window.scrollTo(0, 0); } }
  function prevQ() { if (currentIndex > 0) { currentIndex--; renderQuestion(); updateProgress(); renderSidebar(); window.scrollTo(0, 0); } }
  function markSkip() { var q = questions[currentIndex]; skipped[q.id] = !skipped[q.id]; renderQuestion(); renderSidebar(); }
  function updateProgress() {
    var pct = questions.length > 0 ? Math.round((currentIndex + 1) / questions.length * 100) : 0;
    document.getElementById('u-progress-fill').style.width = pct + '%';
    document.getElementById('u-progress-text').textContent = '第 ' + (currentIndex + 1) + ' 题 / 共 ' + questions.length + ' 题';
  }

  function submitTest() {
    var us = questions.filter(function(q) { return !submitted[q.id]; });
    if (us.length > 0 && !confirm('还有 ' + us.length + ' 道题未确认，未确认的题计为错误。确定交卷？')) return;
    us.forEach(function(q) { submitted[q.id] = true; });
    testSubmitted = true; stopTimer(); document.getElementById('u-timer').style.display = 'none';
    var correct = 0;
    questions.forEach(function(q) {
      if (isCorrect(userAnswers[q.id], getRealAns(q))) correct++; else addWrongQuestion(unit.id, q.id);
    });
    var total = questions.length, percent = Math.round(correct / total * 100), grade = getScoreGrade(percent);
    saveTestHistory(unit.id, correct, total);
    document.getElementById('u-content').innerHTML =
      '<div class="result-card"><h2>测验完成！</h2><div class="result-score">' + correct + '<span style="font-size:1.5rem"> / ' + total + '</span></div>' +
      '<span class="score-badge ' + grade.cls + '">' + grade.text + ' · ' + percent + '%</span>' +
      '<div class="result-detail"><div class="result-item"><div class="num" style="color:#2E7D32">' + correct + '</div><div class="label">正确</div></div>' +
      '<div class="result-item"><div class="num" style="color:#C62828">' + (total - correct) + '</div><div class="label">错误</div></div>' +
      '<div class="result-item"><div class="num">' + formatTime(timerSeconds) + '</div><div class="label">用时</div></div></div></div>';
    document.getElementById('u-bottom').innerHTML = '<button class="btn btn-outline" onclick="unitPage.reviewTest()">查看答卷</button><button class="btn btn-primary" onclick="unitPage.switchMode(\'test\')">重新测验</button>';
    document.getElementById('u-progress-fill').style.width = '100%'; document.getElementById('u-progress-text').textContent = '';
    document.getElementById('u-mode-label').textContent = '测验结果'; document.getElementById('u-sidebar-grid').innerHTML = '';
  }

  function reviewTest() { testSubmitted = true; currentIndex = 0; renderQuestion(); updateProgress(); renderSidebar(); document.getElementById('u-mode-label').textContent = '查看答卷'; }

  function finishPractice() {
    var correct = 0, answered = 0;
    questions.forEach(function(q) { if (submitted[q.id]) { answered++; if (isCorrect(userAnswers[q.id], getRealAns(q))) correct++; } });
    var grade = getScoreGrade(answered > 0 ? Math.round(correct / answered * 100) : 0);
    document.getElementById('u-content').innerHTML =
      '<div class="result-card"><h2>练习完成！</h2><div class="result-score">' + correct + '<span style="font-size:1.5rem"> / ' + answered + '</span></div>' +
      '<span class="score-badge ' + grade.cls + '">已答 ' + answered + ' 题，正确 ' + correct + ' 题</span>' +
      '<div class="result-detail"><div class="result-item"><div class="num" style="color:#2E7D32">' + correct + '</div><div class="label">正确</div></div>' +
      '<div class="result-item"><div class="num" style="color:#C62828">' + (answered - correct) + '</div><div class="label">错误</div></div>' +
      '<div class="result-item"><div class="num">' + (questions.length - answered) + '</div><div class="label">未答</div></div></div></div>';
    document.getElementById('u-bottom').innerHTML = '<button class="btn btn-primary" onclick="unitPage.switchMode(\'practice\')">重新练习</button>';
    document.getElementById('u-progress-fill').style.width = '100%'; document.getElementById('u-progress-text').textContent = '';
  }

  // Public API
  return {
    start: init,
    switchMode: switchMode,
    toggleSidebar: toggleSidebar,
    jump: jump,
    nextQ: nextQ, prevQ: prevQ,
    markSkip: markSkip,
    submitCur: submitCurrent,
    submitTest: submitTest,
    reviewTest: reviewTest,
    finishPractice: finishPractice
  };
})();

// ====== WRONG BOOK PAGE ======
var wrongPage = (function() {
  var wmode, wQs, wIdx, wAns, wSubmitted, wSidebar;

  function start() {
    wmode = 'list'; wSidebar = false;
    document.getElementById('w-btn-list').classList.add('active');

  function switchWMode(m) {

  function toggleSidebar() {

      var unit = findUnit(w.unitId);

      if (!grouped[uname]) grouped[uname] = [];
      var q = unit ? unit.questions.find(function(q) { return q.id === w.questionId; }) : null;
      grouped[uname].push({qt: q ? q.q : '(已删除)', uname: uname, wrongCount: w.wrongCount});
    });

    var html = '';
    for (var uname in grouped) {
      var items = grouped[uname];

  function buildQs() {

      var q = unit.questions.find(function(q) { return q.id === w.questionId; });
      if (q) {
        var indices = q.opts.map(function(_, i) { return i; });
        var s = shuffle(indices);
        var c = Object.assign({}, q);
        c.unitId = w.unitId; c.unitName = unit.name; c.wrongCount = w.wrongCount;
        c.shuffledOpts = s.map(function(i) { return q.opts[i]; });
        c._shuffledAns = Array.isArray(q.ans) ? q.ans.map(function(a) { return s.indexOf(a); }).sort(function(a, b) { return a - b; }) : s.indexOf(q.ans);
        result.push(c);
      }
    });
    return shuffle(result);
  }

  function startReview() {
    wQs = buildQs(); wIdx = 0; wAns = {}; wSubmitted = {};
    if (wQs.length === 0) {
      document.getElementById('w-review-content').innerHTML = '<div class="empty-state"><div class="icon">🎉</div><p>没有错题可复习！</p></div>';
      document.getElementById('w-review-bottom').innerHTML = '';
      document.getElementById('w-sidebar-grid').innerHTML = '';
      return;
    }
    renderWQ(); updateWProgress(); renderWSidebar();
  }

  function renderWSidebar() {
    var html = '';
    for (var i = 0; i < wQs.length; i++) {
      var cls = 'sidebar-num';
      if (i === wIdx) cls += ' current';
      else if (wSubmitted[wQs[i].id]) cls += ' answered';
      html += '<div class="' + cls + '" onclick="wrongPage.jump(' + i + ')">' + (i + 1) + '</div>';
    }
    document.getElementById('w-sidebar-grid').innerHTML = html;
  }

  function jump(i) { wIdx = i; renderWQ(); updateWProgress(); renderWSidebar(); window.scrollTo(0, 0); }

  function renderWQ() {
    var q = wQs[wIdx], opts = q.shuffledOpts || q.opts, realAns = q._shuffledAns;
    var isMulti = q.type === 'multi', userAns = wAns[q.id];
    var isSubmitted = wSubmitted[q.id] === true;
    var showResult = isMulti ? isSubmitted : (userAns !== undefined);
    var letters = 'ABCDEFGHIJ';

    var html = '<div class="question-card"><span class="question-num">第 ' + (wIdx + 1) + ' 题</span>' +
      (isMulti ? '<span class="type-badge multi">多选</span>' : '<span class="type-badge single">单选</span>') +
      '<span style="margin-left:8px;color:#999;font-size:0.85rem">' + q.unitName + ' · 错过' + q.wrongCount + '次</span>' +
      '<div class="question-text">' + q.q + '</div>' +
      '<div style="font-size:0.85rem;color:#999;margin-bottom:8px">' + (isMulti ? '（可多选）' : '（单选）') + '</div>' +
      '<div class="options-list">';

    opts.forEach(function(opt, i) {
      var isSelected = Array.isArray(userAns) ? userAns.indexOf(i) >= 0 : (userAns === i);
      var isCorrect = Array.isArray(realAns) ? realAns.indexOf(i) >= 0 : (realAns === i);

      else if (isSelected) cls += ' selected';
      html += '<div class="' + cls + '" data-idx="' + i + '">' +
        (isMulti ? '<span class="checkmark"></span>' : '<span class="option-letter">' + letters[i] + '</span>') +
        '<span class="option-text">' + opt + '</span></div>';
    });

    html += '</div>';
    if (showResult) {
      if (wIsCorrect(userAns, realAns)) html += '<div class="feedback correct-fb show">✅ 正确！已从错题本移除</div>';
      else {
        var cs = Array.isArray(realAns) ? realAns.map(function(a) { return letters[a] + '. ' + opts[a]; }).join('；') : letters[realAns] + '. ' + opts[realAns];
        html += '<div class="feedback wrong-fb show">❌ 错误！正确答案：<strong>' + cs + '</strong></div>';
      }
    }

    if (!showResult) {
      document.querySelectorAll('#w-review-content .option-item').forEach(function(item) {
        item.addEventListener('click', function() { wHandleAns(parseInt(this.dataset.idx), isMulti); });
      });
    }
    renderWBottom();
  }

  function wIsCorrect(u, r) {
    if (u === undefined) return false;
    if (Array.isArray(r) && Array.isArray(u)) { if (r.length !== u.length) return false; var s = u.slice().sort(function(a, b) { return a - b; }); return r.every(function(v, i) { return v === s[i]; }); }
    if (!Array.isArray(r) && !Array.isArray(u)) return u === r;
    return false;
  }

  function wHandleAns(oi, isMulti) {
    var q = wQs[wIdx], ra = q._shuffledAns;
    if (isMulti) {
      var cur = wAns[q.id]; if (!Array.isArray(cur)) cur = [];
      var idx = cur.indexOf(oi); if (idx >= 0) cur.splice(idx, 1); else cur.push(oi);
      cur.sort(function(a, b) { return a - b; }); wAns[q.id] = cur;

      } else { addWrongQuestion(q.unitId, q.id); }

  }

  function submitWAnswer() {
    var q = wQs[wIdx], userAns = wAns[q.id], ra = q._shuffledAns;
    wSubmitted[q.id] = true;
    if (wIsCorrect(userAns, ra)) {
      removeWrongQuestion(q.unitId, q.id);
      wQs = buildQs();

        document.getElementById('w-review-content').innerHTML = '<div class="empty-state"><div class="icon">🎉</div><p>全部错题已清除！</p></div>';

      }

    } else { addWrongQuestion(q.unitId, q.id); }
    renderWQ(); renderWSidebar();

  function renderWBottom() {
    var q = wQs[wIdx], isMulti = q.type === 'multi';

      ? (Array.isArray(wAns[q.id]) && wAns[q.id].length > 0)

    var isSubmitted = wSubmitted[q.id] === true;
